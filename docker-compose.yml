version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/database.db:/app/database.db
    environment:
      - DB_PATH=./database.db
      - ADMIN_PASSWORD=admin123
      - PORT=5000

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server